<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dropship Store</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#f5f5f5;
}

/* HEADER */
.header{
    background:linear-gradient(135deg,#ff4d00,#b30000);
    padding:20px;
    color:white;
}

.search-box{
    margin-bottom:20px;
}

.search-box input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:18px;
}

.store-info{
    display:flex;
    align-items:center;
    gap:20px;
}

.logo{
    width:90px;
    height:90px;
    background:white;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    font-weight:bold;
    color:black;
}

.store-text h2{
    margin-bottom:10px;
}

.store-text p{
    font-size:18px;
}

/* KATEGORI */
.kategori{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    padding:20px;
}

.kategori button{
    padding:25px;
    border:1px solid #ddd;
    background:white;
    border-radius:8px;
    font-size:22px;
    cursor:pointer;
}

/* MORE */
.more{
    text-align:center;
    margin-bottom:20px;
    font-size:22px;
    color:#666;
}

/* PRODUK */
.produk{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
    padding:15px;
}

.card{
    background:white;
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 2px 5px rgba(0,0,0,.1);
}

.card img{
    width:100%;
    height:350px;
    object-fit:cover;
}

.info{
    padding:15px;
}

.kode{
    font-size:24px;
    margin-bottom:10px;
}

.harga{
    color:#ff4500;
    font-weight:bold;
}

.btn{
    display:block;
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#ff4500;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

</style>
</head>
<body>

<!-- HEADER -->
<div class="header">

    <div class="search-box">
        <input type="text" placeholder="Cari Produk Berdasarkan Kode">
    </div>

    <div class="store-info">

        <div class="logo">
            LOGO
        </div>

        <div class="store-text">
            <h2>Ketik Nomor Link yang Dicari 👇👇</h2>
            <p>Cari produk sesuai nomor link yang ada di postingan dropship.</p>
        </div>

    </div>

</div>

<!-- KATEGORI -->
<div class="kategori">
    <button>2451 - 2500</button>
    <button>2401 - 2450</button>
</div>

<div class="more">
    Lebih Banyak ▼
</div>

<!-- PRODUK -->
<div class="produk">

    <div class="card">
        <img src="https://images.unsplash.com/photo-1517438476312-10d79c077509?w=500" alt="">
        <div class="info">
            <div class="kode">2641</div>
            <div class="harga">Rp 189.000</div>
            <button class="btn">Pesan Sekarang</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1542272604-787c3835535d?w=500" alt="">
        <div class="info">
            <div class="kode">2642</div>
            <div class="harga">Rp 219.000</div>
            <button class="btn">Pesan Sekarang</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=500" alt="">
        <div class="info">
            <div class="kode">2643</div>
            <div class="harga">Rp 175.000</div>
            <button class="btn">Pesan Sekarang</button>
        </div>
    </div>

    <div class="card">
        <img src="https://images.unsplash.com/photo-1523398002811-999ca8dec234?w=500" alt="">
        <div class="info">
            <div class="kode">2644</div>
            <div class="harga">Rp 210.000</div>
            <button class="btn">Pesan Sekarang</button>
        </div>
    </div>

</div>

</body>
</html>
