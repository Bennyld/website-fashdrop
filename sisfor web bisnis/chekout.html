<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Checkout - FashDrop</title>

    <link rel="stylesheet" href="chekout.css">

</head>

<body>

    <!-- Overlay -->
    <div id="overlay" class="overlay" onclick="closeSidebar()"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">

        <div class="sidebar-header">

            <img src="foto_Benny Leonardo (1).jpg">

            <h3>Customer</h3>

            <p>Benny Leonardo</p>

        </div>

        <div class="sidebar-menu">

            <a href="index.html">🏠 Home</a>

            <a href="pesanan.html">📦 Pesanan Saya</a>

            <a href="profile.html">👤 Profile</a>

            <a href="#">🚪 Logout</a>

        </div>

    </div>

    <div class="mobile-container">

        <header>

            <div class="header-top">

                <div class="menu-button" onclick="openSidebar()">
                    ☰
                </div>

                <div>

                    <h2>Checkout</h2>

                    <p>Pastikan data pesanan sudah benar.</p>

                </div>

            </div>

        </header>

        <section class="checkout">

            <img src="produk no 1.png" class="produk-img">

            <h3>Hammerstout Chino Slim Straight</h3>

            <p class="harga">Rp180.000</p>

            <label>Ukuran</label>

            <select>

                <option>S</option>

                <option>M</option>

                <option>L</option>

                <option selected>XL</option>

            </select>

            <label>Jumlah</label>

            <input type="number" value="1" min="1">

            <label>Nama Penerima</label>

            <input type="text" placeholder="Masukkan Nama">

            <label>No. HP</label>

            <input type="text" placeholder="08xxxxxxxxxx">

            <label>Alamat Lengkap</label>

            <textarea rows="4" placeholder="Masukkan alamat lengkap"></textarea>

            <label>Metode Pembayaran</label>

            <select id="metodePembayaran">

                <option>Transfer Bank</option>

                <option>QRIS</option>

                <option>COD</option>

            </select>

            <div class="ringkasan">

                <h3>Ringkasan</h3>

                <div class="row">

                    <span>Harga Produk</span>

                    <span>Rp129.000</span>

                </div>

                <div class="row">

                    <span>Ongkir</span>

                    <span>Rp20.000</span>

                </div>

                <div class="row total">

                    <span>Total</span>

                    <span>Rp149.000</span>

                </div>

            </div>

            <button class="checkout-btn" onclick="buatPesanan()">
                Buat Pesanan
            </button>

        </section>

    </div>

    <script>

        function openSidebar() {

            document.getElementById("sidebar").classList.add("active");

            document.getElementById("overlay").classList.add("active");

        }

        function closeSidebar() {

            document.getElementById("sidebar").classList.remove("active");

            document.getElementById("overlay").classList.remove("active");

        }

        function buatPesanan() {

            const pembayaran = document.getElementById("metodePembayaran").value;

            if (pembayaran == "QRIS") {

                window.location.href = "detail-pembayaran.html";

            }

            else if (pembayaran == "Transfer Bank") {

                window.location.href = "detail-pembayaran.html";

            }

            else {

                alert("Pesanan berhasil dibuat!");

                window.location.href = "pesanan.html";

            }

        }

    </script>

</body>

</html>
